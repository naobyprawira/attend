<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Attend.AI | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary": "#5e5d6c",
              "primary-fixed-dim": "#ffaedb",
              "on-secondary-fixed": "#1a1a27",
              "surface-container-low": "#f5f3f4",
              "on-tertiary-fixed-variant": "#245100",
              "error": "#ba1a1a",
              "on-error-container": "#93000a",
              "on-primary-fixed-variant": "#7d2060",
              "on-primary-container": "#ffb9df",
              "on-background": "#1b1c1d",
              "error-container": "#ffdad6",
              "surface-variant": "#e4e2e3",
              "surface-tint": "#9a3979",
              "outline": "#85727b",
              "on-primary-fixed": "#3c002b",
              "surface-dim": "#dbd9da",
              "on-surface": "#1b1c1d",
              "tertiary-fixed-dim": "#99d76c",
              "background": "#fbf9fa",
              "surface-bright": "#fbf9fa",
              "on-secondary": "#ffffff",
              "surface-container-highest": "#e4e2e3",
              "on-error": "#ffffff",
              "primary": "#751859",
              "on-secondary-container": "#646372",
              "tertiary-fixed": "#b4f485",
              "tertiary-container": "#2e6400",
              "secondary-container": "#e3e0f2",
              "on-surface-variant": "#53424a",
              "primary-container": "#923272",
              "inverse-on-surface": "#f2f0f1",
              "inverse-primary": "#ffaedb",
              "surface": "#fbf9fa",
              "surface-container-high": "#e9e8e9",
              "outline-variant": "#d8c0ca",
              "primary-fixed": "#ffd8eb",
              "inverse-surface": "#303031",
              "on-primary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#e3e0f2",
              "secondary-fixed-dim": "#c7c5d6",
              "on-tertiary": "#ffffff",
              "surface-container": "#efedee",
              "on-secondary-fixed-variant": "#464553",
              "on-tertiary-fixed": "#0b2000",
              "tertiary": "#204a00",
              "on-tertiary-container": "#a1e074"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: linear-gradient(135deg, #923272 0%, #2D2D3A 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased">
<!-- Standalone Login Canvas -->
<main class="min-h-screen w-full flex items-center justify-center bg-login-gradient p-6">
<!-- Login Card Container -->
<div class="w-full max-w-md">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="mb-4 p-4 rounded-full bg-white/10 backdrop-blur-md">
<span class="material-symbols-outlined text-white text-4xl" data-icon="lens_blur">lens_blur</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tighter text-white font-headline">Attend.AI</h1>
<p class="text-white/70 text-sm mt-2 font-medium tracking-wide uppercase">Institutional Intelligence</p>
</div>
<!-- Centralized Minimalist Card -->
<div class="glass-panel rounded-xl p-10 shadow-2xl">
<header class="mb-8">
<h2 class="text-2xl font-bold text-on-surface tracking-tight">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your details to continue.</p>
</header>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-secondary-fixed uppercase tracking-widest" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary-container/20 text-on-surface placeholder:text-outline transition-all duration-200" id="email" name="email" placeholder="name@company.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold text-on-secondary-fixed uppercase tracking-widest" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary-container/20 text-on-surface placeholder:text-outline transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="rounded border-outline-variant text-primary focus:ring-primary-container/20" type="checkbox"/>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full py-4 bg-primary-container text-white font-bold rounded-lg shadow-lg shadow-primary-container/30 hover:shadow-primary-container/40 active:scale-[0.98] transition-all duration-300" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Footer Context -->
<div class="mt-10 pt-6 border-t border-outline-variant/10 flex flex-col items-center space-y-4">
<p class="text-sm text-on-surface-variant">Don't have an account?</p>
<button class="w-full py-3 bg-surface-container-high text-primary font-bold rounded-lg hover:bg-surface-container transition-colors">
                        Request Access
                    </button>
</div>
</div>
<!-- Legal and Support -->
<footer class="mt-12 flex justify-center space-x-6">
<a class="text-white/60 text-xs font-medium hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="text-white/60 text-xs font-medium hover:text-white transition-colors" href="#">Terms of Service</a>
<a class="text-white/60 text-xs font-medium hover:text-white transition-colors" href="#">Contact Support</a>
</footer>
</div>
</main>
<!-- Decoration Layer: Subtle Ambient Light -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] bg-primary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] bg-on-secondary-fixed/30 blur-[120px] rounded-full"></div>
</div>
</body></html>
