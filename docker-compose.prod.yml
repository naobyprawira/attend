services:
  api:
    image: ghcr.io/${GHCR_OWNER:-maulairfani}/attend:${IMAGE_TAG:-prod}
    restart: unless-stopped
    environment:
      MODE: api
      SERVER_ROLE: ${SERVER_ROLE:-app}
      AI_WS_UPSTREAM_URL: ${AI_WS_UPSTREAM_URL:-ws://ai-backend:5679}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://attend:attend@postgres:5432/attend}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      KNOWN_FACES_DIR: /app/server/known_faces
    ports:
      - "${API_PORT:-5678}:5678"
    volumes:
      - known_faces:/app/server/known_faces
    networks:
      - default
      - attend_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5678/api/status', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: ghcr.io/${GHCR_OWNER:-maulairfani}/attend:${IMAGE_TAG:-prod}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      MODE: web
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5678}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - default
      - proxy_network

volumes:
  known_faces:

networks:
  attend_network:
    external: true
  proxy_network:
    external: true
